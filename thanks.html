<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanks — MyGCTracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0D1B2A; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .card { max-width: 480px; }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; margin-bottom: 1rem; }
    p { color: rgba(255,255,255,0.55); font-size: 15px; line-height: 1.7; margin-bottom: 2rem; }
    a { display: inline-block; background: #2563EB; color: white; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; }
    a:hover { background: #3B82F6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Message received!</h1>
    <p>Thanks for reaching out. We'll be in touch within 24 hours to get you set up.</p>
    <a href="/">← Back to MyGCTracker</a>
  </div>
</body>
</html>
